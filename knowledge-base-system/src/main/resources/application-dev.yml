#debug: true

spring:
  config:
    import: classpath:llm.yml
  ai:
    # 注意：本项目 chat / embedding 模型全部由 LLMServiceImpl 手动 build（具体 base-url / api-key / model 来自 llm.yml），
    # 因此这里不再设置 spring.ai.openai.* 与 spring.ai.ollama.*（也别加 spring.ai.model.*=openai/ollama，否则自动装配会再次启动）。
    # pgvector 仍依赖 Spring AI 自动装配，所以保留 vectorstore.pgvector 配置。
    vectorstore:
      pgvector:
        initialize-schema: true
        table-name: vector_store_bge_m3
        dimensions: 1024
        remove-existing-vector-store-table: false
  datasource:
    username: pguser
    password: 123456
    url: jdbc:postgresql://localhost:5432/pgtest?currentSchema=public

# MinIO
minio:
  endpoint: http://127.0.0.1:9000/
  access-key: minioadmin
  secret-key: minioadmin
  default-bucket: permission-demo
  default-expiry: 3600 # 临时访问连接1h有效 60 * 6